name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
    paths:
      - 'baifern-detection-api/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Grab your code from GitHub
      - uses: actions/checkout@v3

      # 2. Install the official Hugging Face uploader tool
      - name: Install Hugging Face CLI
        run: pip install -U "huggingface_hub[cli]"

      # 3. Upload the folder directly to your Space (Handles large files automatically!)
      - name: Direct API Upload to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          huggingface-cli upload NoHaxJustTuL/baifern-detection-api ./baifern-detection-api / --repo-type=space --token=$HF_TOKEN